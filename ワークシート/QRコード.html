<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRコード一覧</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', 'ヒラギノ丸ゴ Pro', sans-serif;
  background: #f0f4ff;
  padding: 32px 20px;
}

@media print {
  body { background: #fff; padding: 0; }
  .no-print { display: none; }
  .page { box-shadow: none; }
}

.print-btn {
  display: block;
  margin: 0 auto 28px;
  padding: 12px 40px;
  background: #3d5afe;
  color: #fff;
  border: none;
  border-radius: 30px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 4px 14px rgba(61,90,254,0.35);
}
.print-btn:hover { background: #1a37d4; }

.page {
  max-width: 720px;
  margin: 0 auto;
  background: #fff;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.12);
}

/* ヘッダー */
.header {
  background: linear-gradient(135deg, #1565c0 0%, #42a5f5 100%);
  padding: 32px 40px;
  text-align: center;
  color: #fff;
}
.header-icon { font-size: 52px; margin-bottom: 8px; }
.header-title { font-size: 30px; font-weight: 900; margin-bottom: 4px; }
.header-sub { font-size: 17px; opacity: 0.85; }

/* セクション */
.section {
  padding: 28px 32px;
  border-bottom: 2px solid #f0f0f0;
}
.section:last-child { border-bottom: none; }

.section-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.section-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.section-title { font-size: 20px; font-weight: 900; }
.section-sub { font-size: 14px; color: #888; margin-top: 2px; }

/* カードグリッド */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
}
.card {
  background: #fafafa;
  border-radius: 16px;
  padding: 18px 14px;
  text-align: center;
  border: 2px solid #eee;
  transition: box-shadow 0.2s;
}
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.card-month {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 10px;
}
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; line-height: 1.4; color: #222; }
.qr-wrap { display: flex; justify-content: center; }

/* フッター */
.footer {
  background: #f8f9ff;
  padding: 20px 32px;
  text-align: center;
  font-size: 14px;
  color: #999;
}
</style>
</head>
<body>

<button class="print-btn no-print" onclick="window.print()">🖨️ いんさつする</button>

<div class="page">

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-icon">📱</div>
    <div class="header-title">スマホで使える！ QRコード</div>
    <div class="header-sub">特別支援学校 中学部｜スマホのカメラで読み取ってね</div>
  </div>

  <!-- 国語 -->
  <div class="section">
    <div class="section-head">
      <div class="section-icon" style="background:#e8f5e9;">📖</div>
      <div>
        <div class="section-title" style="color:#2e7d32;">こくご｜じょしの べんきょう</div>
        <div class="section-sub">は・を・に・も・で</div>
      </div>
    </div>
    <div class="cards" id="japanese"></div>
  </div>

  <!-- 数学 標準版 -->
  <div class="section">
    <div class="section-head">
      <div class="section-icon" style="background:#e3f2fd;">📐</div>
      <div>
        <div class="section-title" style="color:#1565c0;">すうがく｜標準版</div>
        <div class="section-sub">中学生レベル</div>
      </div>
    </div>
    <div class="cards" id="math-standard"></div>
  </div>

  <!-- 数学 やさしい版 -->
  <div class="section">
    <div class="section-head">
      <div class="section-icon" style="background:#fff3e0;">📐</div>
      <div>
        <div class="section-title" style="color:#e65100;">すうがく｜やさしい版</div>
        <div class="section-sub">小学1〜2年生レベル</div>
      </div>
    </div>
    <div class="cards" id="math-easy"></div>
  </div>

  <div class="footer">カメラアプリを開いて、QRコードに向けてください 📷</div>
</div>

<script>
const base = 'https://a4i2mtsunghrok-prog.github.io/claude-project2/'
           + encodeURIComponent('ワークシート') + '/';

const sections = {
  japanese: {
    color: '#2e7d32',
    items: [
      { title:'じょし\nれんしゅう', month:'✏️', monthColor:'#e8f5e9', monthText:'#2e7d32', file:'国語アプリ_じょし.html' },
      { title:'3ごぶん\nじょし', month:'✏️', monthColor:'#c8e6c9', monthText:'#1b5e20', file:'国語アプリ_3語文.html' },
      { title:'ことばを\nふやそう', month:'🗣️', monthColor:'#fff9c4', monthText:'#e65100', file:'国語アプリ_ことば.html' },
      { title:'ワークシート\n①「は」', month:'5月', monthColor:'#e8f5e9', monthText:'#2e7d32', file:'国語01_じょし_は.html' },
    ]
  },
  'math-standard': {
    color: '#1565c0',
    items: [
      { title:'もくじ', month:'📚', monthColor:'#e3f2fd', monthText:'#1565c0', file:'00_もくじ.html' },
      { title:'お金①\n硬貨とお札', month:'5月', monthColor:'#fff9c4', monthText:'#e65100', file:'01_お金_硬貨とお札.html' },
      { title:'お金②\nおつり', month:'6月', monthColor:'#fff9c4', monthText:'#e65100', file:'02_お金_おつり.html' },
      { title:'お金③\n買い物', month:'9月', monthColor:'#fff9c4', monthText:'#e65100', file:'03_お金_予算で買い物.html' },
      { title:'時間④\n逆算', month:'7月', monthColor:'#e3f2fd', monthText:'#1565c0', file:'04_時間_逆算.html' },
      { title:'仕事⑤\n給料', month:'2月', monthColor:'#e8f5e9', monthText:'#2e7d32', file:'05_仕事_給料.html' },
    ]
  },
  'math-easy': {
    color: '#e65100',
    items: [
      { title:'もくじ', month:'📚', monthColor:'#fff3e0', monthText:'#e65100', file:'新00_もくじ.html' },
      { title:'おかね①\nコイン', month:'5がつ', monthColor:'#fff9c4', monthText:'#e65100', file:'新01_おかね_コインをみよう.html' },
      { title:'おかね②\nおつり', month:'6がつ', monthColor:'#fff9c4', monthText:'#e65100', file:'新02_おかね_おつり.html' },
      { title:'おかね③\nかいもの', month:'9がつ', monthColor:'#fff9c4', monthText:'#e65100', file:'新03_おかね_かいものリスト.html' },
      { title:'じかん④\nなんじ', month:'7がつ', monthColor:'#e3f2fd', monthText:'#1565c0', file:'新04_じかん_なんじ.html' },
      { title:'しごと⑤\nきゅうりょう', month:'2がつ', monthColor:'#e8f5e9', monthText:'#2e7d32', file:'新05_しごと_きゅうりょう.html' },
    ]
  }
};

Object.entries(sections).forEach(([sectionId, section]) => {
  const container = document.getElementById(sectionId);
  section.items.forEach((item, i) => {
    const id = `qr-${sectionId}-${i}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-month" style="background:${item.monthColor};color:${item.monthText}">${item.month}</div>
      <div class="card-title">${item.title.replace(/\n/g, '<br>')}</div>
      <div class="qr-wrap"><div id="${id}"></div></div>
    `;
    container.appendChild(card);
    new QRCode(document.getElementById(id), {
      text: base + encodeURIComponent(item.file),
      width: 130, height: 130,
      colorDark: '#000', colorLight: '#fff',
      correctLevel: QRCode.CorrectLevel.M
    });
  });
});
</script>
</body>
</html>
